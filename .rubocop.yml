plugins:
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'

Layout/LineLength:
  Max: 100

# Project convention: double-quoted string literals.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Classes are intentionally undocumented for now; API docs land with a
# later phase together with the RBS signatures.
Style/Documentation:
  Enabled: false

# RSpec example groups and the gemspec are block-heavy by nature.
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'capsium.gemspec'

# Spec helpers take the parameters the fixtures need.
Metrics/ModuleLength:
  Exclude:
    - 'spec/**/*'
  Max: 175

# Spec helpers take the parameters the fixtures need; the reactor
# constructor takes one keyword per deploy-time concern (keyword args
# are self-documenting and not counted).
Metrics/ParameterLists:
  Max: 7
  CountKeywordArgs: false
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  # The reactor (request dispatch + lifecycle), the introspection
  # endpoint set, and the overlay (JSON + SQLite dataset paths under
  # one roof) all cluster around this size.
  Max: 175

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 30

Metrics/CyclomaticComplexity:
  Max: 8

# `db` (SQLite handle), `id` (dataset item key), and `pk` (primary-key
# column) are conventional short names; all three are allowed.
Naming/MethodParameterName:
  AllowedNames: [io, id, to, by, on, in, at, ip, db, pk]
